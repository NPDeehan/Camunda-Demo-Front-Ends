<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="ahf-bg" cx="45%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0D2248"/>
      <stop offset="100%" stop-color="#010508"/>
    </radialGradient>
    <filter id="ahf-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ahf-bigglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="ahf-topArc" d="M 14,106 A 86,86 0 0,1 186,106"/>
  </defs>

  <!-- Space background -->
  <circle cx="100" cy="100" r="99" fill="url(#ahf-bg)"/>

  <!-- Outer border ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#00C8FF" stroke-width="1.5"/>
  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#00C8FF" stroke-width="0.5" opacity="0.3"/>

  <!-- Cardinal tick marks -->
  <line x1="100" y1="3"   x2="100" y2="13"  stroke="#00C8FF" stroke-width="1.5" opacity="0.9"/>
  <line x1="100" y1="187" x2="100" y2="197" stroke="#00C8FF" stroke-width="1.5" opacity="0.9"/>
  <line x1="3"   y1="100" x2="13"  y2="100" stroke="#00C8FF" stroke-width="1.5" opacity="0.9"/>
  <line x1="187" y1="100" x2="197" y2="100" stroke="#00C8FF" stroke-width="1.5" opacity="0.9"/>
  <!-- Diagonal tick marks -->
  <line x1="31"  y1="31"  x2="37"  y2="37"  stroke="#00C8FF" stroke-width="1" opacity="0.5"/>
  <line x1="169" y1="31"  x2="163" y2="37"  stroke="#00C8FF" stroke-width="1" opacity="0.5"/>
  <line x1="31"  y1="169" x2="37"  y2="163" stroke="#00C8FF" stroke-width="1" opacity="0.5"/>
  <line x1="169" y1="169" x2="163" y2="163" stroke="#00C8FF" stroke-width="1" opacity="0.5"/>

  <!-- Stars -->
  <circle cx="28"  cy="38"  r="1.1" fill="white" opacity="0.9"/>
  <circle cx="172" cy="32"  r="1.3" fill="white" opacity="0.7"/>
  <circle cx="18"  cy="88"  r="0.8" fill="white" opacity="0.8"/>
  <circle cx="184" cy="75"  r="1.0" fill="white" opacity="0.6"/>
  <circle cx="155" cy="22"  r="1.2" fill="white" opacity="0.8"/>
  <circle cx="48"  cy="168" r="0.9" fill="white" opacity="0.7"/>
  <circle cx="178" cy="158" r="1.0" fill="white" opacity="0.9"/>
  <circle cx="22"  cy="148" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="88"  cy="16"  r="1.1" fill="white" opacity="0.7"/>
  <circle cx="162" cy="178" r="0.9" fill="white" opacity="0.8"/>
  <circle cx="62"  cy="14"  r="0.7" fill="white" opacity="0.5"/>
  <circle cx="138" cy="184" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="52"  cy="52"  r="0.7" fill="white" opacity="0.4"/>
  <circle cx="148" cy="148" r="0.7" fill="white" opacity="0.4"/>

  <!-- Nebula glow hints -->
  <circle cx="62"  cy="62"  r="22" fill="#2D0A4E" opacity="0.25"/>
  <circle cx="148" cy="138" r="16" fill="#0A2D5E" opacity="0.2"/>

  <!-- Background planet upper-right -->
  <circle cx="158" cy="46" r="16" fill="#0A1F3D" stroke="#1A4A8C" stroke-width="0.8" opacity="0.85"/>
  <ellipse cx="158" cy="46" rx="22" ry="5.5" fill="none" stroke="#1E6ACC" stroke-width="0.9" opacity="0.55"/>
  <!-- Planet surface bands -->
  <path d="M 144,41 Q 158,38 172,43" fill="none" stroke="#1A5A9C" stroke-width="0.7" opacity="0.4"/>
  <path d="M 143,49 Q 158,52 173,48" fill="none" stroke="#1A5A9C" stroke-width="0.7" opacity="0.3"/>

  <!-- Ship hull body -->
  <path d="M100,50 C107,64 110,80 110,98 L100,104 L90,98 C90,80 93,64 100,50 Z"
        fill="#0C2D5E" stroke="#00C8FF" stroke-width="1.1" filter="url(#ahf-glow)"/>
  <!-- Hull inner highlight -->
  <path d="M100,54 C104,65 106,78 106,93 L100,97 L94,93 C94,78 96,65 100,54 Z"
        fill="#1A4A8C" opacity="0.6"/>
  <!-- Cockpit window -->
  <ellipse cx="100" cy="70" rx="4.5" ry="6" fill="#00C8FF" opacity="0.25"/>
  <ellipse cx="100" cy="70" rx="3"   ry="4" fill="#00C8FF" opacity="0.2" filter="url(#ahf-glow)"/>
  <!-- Nose tip glow -->
  <circle cx="100" cy="52" r="3.5" fill="#00C8FF" filter="url(#ahf-bigglow)" opacity="0.9"/>

  <!-- Wing fins -->
  <path d="M90,98  L76,118 L90,111 Z" fill="#091E40" stroke="#00C8FF" stroke-width="0.9"/>
  <path d="M110,98 L124,118 L110,111 Z" fill="#091E40" stroke="#00C8FF" stroke-width="0.9"/>

  <!-- Engine exhaust / thruster -->
  <path d="M94,104 Q100,122 106,104" fill="#6B1FCE" opacity="0.75" filter="url(#ahf-glow)"/>
  <ellipse cx="100" cy="105" rx="8" ry="3.5" fill="#00C8FF" opacity="0.25" filter="url(#ahf-glow)"/>

  <!-- Orbital ring around ship -->
  <ellipse cx="100" cy="86" rx="42" ry="13" fill="none" stroke="#00C8FF" stroke-width="0.9"
           opacity="0.5" transform="rotate(-22 100 86)"/>
  <!-- Orbiting dot -->
  <circle cx="76" cy="78" r="3" fill="#00C8FF" filter="url(#ahf-glow)"/>

  <!-- Arc text — ALLIED HENNA FEDERATION -->
  <text font-family="'Courier New', Courier, monospace" font-size="9.2" fill="#00C8FF"
        letter-spacing="2.2" font-weight="bold" opacity="0.95">
    <textPath href="#ahf-topArc" startOffset="3%">ALLIED HENNA FEDERATION</textPath>
  </text>

  <!-- Bottom label -->
  <text x="100" y="174" text-anchor="middle" font-family="'Courier New', Courier, monospace"
        font-size="7" fill="#00C8FF" letter-spacing="2.5" opacity="0.7">DEEP SPACE COMMAND</text>
  <!-- Designation line -->
  <text x="100" y="163" text-anchor="middle" font-family="'Courier New', Courier, monospace"
        font-size="6.5" fill="#7B3FCE" letter-spacing="1.5" opacity="0.8">EST. 2847</text>

  <!-- Center cross-hair -->
  <line x1="97" y1="130" x2="103" y2="130" stroke="#00C8FF" stroke-width="0.6" opacity="0.4"/>
  <line x1="100" y1="127" x2="100" y2="133" stroke="#00C8FF" stroke-width="0.6" opacity="0.4"/>
</svg>
